name: Release (macOS)

# Builds the OpenCherry desktop app as a macOS disk image (.dmg), for both
# Apple Silicon (aarch64) and Intel (x86_64), each with a SHA-256 checksum.
#
# Triggers:
#   - Push of a tag matching `v*` (e.g. v0.0.1) — attaches the .dmg files and
#     checksums to the matching GitHub Release.
#   - Manual `workflow_dispatch` — uploads the .dmg files as build artifacts
#     only (no release), useful for contributors without a Mac.
#
# The images are unsigned and not notarized: on first launch macOS Gatekeeper
# may block the app (right-click → Open to bypass).
#
# This workflow attaches files only; the Linux release workflow owns the release
# notes body (action-gh-release@v2 preserves an existing body when not set here).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/desktop

      - name: Build .dmg
        run: pnpm tauri build --bundles dmg --target ${{ matrix.target }}
        working-directory: apps/desktop

      - name: Generate SHA-256 checksum
        run: |
          set -euo pipefail
          for f in target/${{ matrix.target }}/release/bundle/dmg/*.dmg; do
            [ -e "$f" ] || continue
            ( cd "$(dirname "$f")" && shasum -a 256 "$(basename "$f")" > "$(basename "$f").sha256" )
          done

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencherry-macos-${{ matrix.arch }}-dmg
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg.sha256
          if-no-files-found: error

      - name: Attach .dmg to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg.sha256

  # Publishes the Homebrew cask to the tap. Dormant until configured: set the
  # repo variable PUBLISH_HOMEBREW=true and provide the HOMEBREW_TAP_TOKEN secret.
  # See packaging/homebrew/README.md.
  publish-homebrew:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_HOMEBREW == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render cask from release checksums
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          arm="$(curl -fsSL "${base}/opencherry_${version}_aarch64.dmg.sha256" | cut -d' ' -f1)"
          intel="$(curl -fsSL "${base}/opencherry_${version}_x64.dmg.sha256" | cut -d' ' -f1)"
          [ -n "$arm" ] && [ -n "$intel" ] || { echo "missing dmg checksum(s)"; exit 1; }
          sed -e "s/^  version .*/  version \"${version}\"/" \
              -e "s/REPLACE_WITH_SHA256_ARM/${arm}/" \
              -e "s/REPLACE_WITH_SHA256_INTEL/${intel}/" \
              packaging/homebrew/opencherry.rb > opencherry.rb

      - name: Push cask to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/4nrry/homebrew-tap.git" tap
          mkdir -p tap/Casks
          cp opencherry.rb tap/Casks/opencherry.rb
          cd tap
          git config user.name "opencherry-release-bot"
          git config user.email "noreply@opencherry.ai"
          git add Casks/opencherry.rb
          if git diff --cached --quiet; then
            echo "cask unchanged; nothing to push"
          else
            git commit -m "opencherry ${GITHUB_REF_NAME}"
            git push
          fi
