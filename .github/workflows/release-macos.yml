name: Release (macOS)

# Builds the OpenCherry desktop app as a macOS disk image (.dmg), for both
# Apple Silicon (aarch64) and Intel (x86_64).
#
# Triggers:
#   - Push of a tag matching `v*` (e.g. v0.0.1) — attaches the .dmg files to the
#     matching GitHub Release.
#   - Manual `workflow_dispatch` — uploads the .dmg files as build artifacts
#     only (no release), useful for contributors without a Mac.
#
# The images are unsigned and not notarized: on first launch macOS Gatekeeper
# may block the app (right-click → Open to bypass).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/desktop

      - name: Build .dmg
        run: pnpm tauri build --bundles dmg --target ${{ matrix.target }}
        working-directory: apps/desktop

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencherry-macos-${{ matrix.arch }}-dmg
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Attach .dmg to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/bundle/dmg/*.dmg
