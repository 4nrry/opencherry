name: Release (Windows)

# Builds the OpenCherry desktop app as a Windows installer (.exe, NSIS).
#
# Triggers:
#   - Push of a tag matching `v*` (e.g. v0.0.1) — attaches the installer to the
#     matching GitHub Release.
#   - Manual `workflow_dispatch` — uploads the installer as a build artifact
#     only (no release), useful for Windows contributors who just want a build.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/desktop

      - name: Build Windows installer
        run: pnpm tauri build --bundles nsis
        working-directory: apps/desktop

      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          Get-ChildItem target/release/bundle/nsis/*-setup.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -NoNewline -Encoding ascii "$($_.FullName).sha256"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencherry-windows-installer
          path: |
            target/release/bundle/nsis/*-setup.exe
            target/release/bundle/nsis/*-setup.exe.sha256
          if-no-files-found: error

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/nsis/*-setup.exe
            target/release/bundle/nsis/*-setup.exe.sha256

  # Publishes to the Windows Package Manager (winget). Dormant until configured:
  # set the repo variable PUBLISH_WINGET=true and provide the WINGET_TOKEN secret
  # (a CLASSIC PAT with public_repo scope; fine-grained tokens are not supported).
  # A fork of microsoft/winget-pkgs must exist under the repo owner, and the
  # package's first version must already be in winget (submitted once manually).
  # See packaging/winget/README.md.
  publish-winget:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_WINGET == 'true'
    steps:
      - name: Publish to winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: 4nrry.OpenCherry
          installers-regex: '\.exe$'
          release-tag: ${{ github.ref_name }}
          token: ${{ secrets.WINGET_TOKEN }}
