name: Release (Windows)

# Builds the OpenCherry desktop app as a Windows installer (.exe, NSIS).
#
# Triggers:
#   - Push of a tag matching `v*` (e.g. v0.0.1) — attaches the installer to the
#     matching GitHub Release.
#   - Manual `workflow_dispatch` — uploads the installer as a build artifact
#     only (no release), useful for Windows contributors who just want a build.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/desktop

      - name: Build Windows installer
        run: pnpm tauri build --bundles nsis
        working-directory: apps/desktop

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencherry-windows-installer
          path: target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/bundle/nsis/*-setup.exe
